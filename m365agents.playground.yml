# yaml-language-server: $schema=https://aka.ms/m365-agents-toolkits/v1.11/yaml.schema.json
# Visit https://aka.ms/teamsfx-v5.0-guide for details on this file
# Visit https://aka.ms/teamsfx-actions for details on actions
version: v1.11

deploy:
  # Install development tool(s)
  - uses: devTool/install
    with:
      testTool:
        version: ~0.2.7
        symlinkDir: ./devTools/playground
      nodejs:
        symlinkDir: ./devTools/nodejs

  # Generate runtime environment variables
  - uses: file/createOrUpdateEnvironmentFile
    with:
      target: ./.env
      envs:
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTID: ""
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTSECRET: ""
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__TENANTID: ""
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__ANONYMOUS_ALLOWED: "True"
        AZURE_OPENAI_API_KEY: ${{SECRET_AZURE_OPENAI_API_KEY}}
        AZURE_OPENAI_DEPLOYMENT_NAME: ${{AZURE_OPENAI_DEPLOYMENT_NAME}}
        AZURE_OPENAI_ENDPOINT: ${{AZURE_OPENAI_ENDPOINT}}
        # Copilot Studio Registry
        COPILOT_AGENTS: ${{COPILOT_AGENTS}}
        # RH Agent
        COPILOT_RH_NAME: ${{COPILOT_RH_NAME}}
        COPILOT_RH_DEPARTMENT: ${{COPILOT_RH_DEPARTMENT}}
        COPILOT_RH_DESCRIPTION: ${{COPILOT_RH_DESCRIPTION}}
        COPILOT_RH_DIRECT_LINE_SECRET: ${{SECRET_COPILOT_RH_DIRECT_LINE_SECRET}}
        # TI Agent
        COPILOT_TI_NAME: ${{COPILOT_TI_NAME}}
        COPILOT_TI_DEPARTMENT: ${{COPILOT_TI_DEPARTMENT}}
        COPILOT_TI_DESCRIPTION: ${{COPILOT_TI_DESCRIPTION}}
        COPILOT_TI_DIRECT_LINE_SECRET: ${{SECRET_COPILOT_TI_DIRECT_LINE_SECRET}}
        # Runtime Config
        DIRECT_LINE_TIMEOUT_SEC: ${{DIRECT_LINE_TIMEOUT_SEC}}
        DIRECT_LINE_POLL_INTERVAL_SEC: ${{DIRECT_LINE_POLL_INTERVAL_SEC}}
        SSL_VERIFY: ${{SSL_VERIFY}}
        DEBUG_MODE: ${{DEBUG_MODE}}
